<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} != null ? ${title} + ' | Quản trị viên' : 'Quản trị viên'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/assets/vendors/fontawesome/css/all.min.css"/>

    <style>
        body {
            background: #f6f7fb;
        }

        .sidebar {
            min-height: 100vh;
            background: #0b1f3a;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, .85);
            border-radius: 10px;
            padding: .65rem .85rem;
            text-decoration: none;
            display: block;
        }

        .sidebar .nav-link.active, .sidebar .nav-link:hover {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        .brand {
            color: #fff;
            font-weight: 700;
            letter-spacing: .4px;
            font-size: 1.25rem;
        }

        .thumb {
            width: 54px;
            height: 54px;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <aside class="col-lg-2 sidebar d-none d-lg-block p-3 text-white">
            <div class="mb-4 py-2 border-bottom border-white border-opacity-10">
                <span class="brand text-uppercase"><i
                        class="fas fa-user-shield me-2 text-danger"></i> Smart Casual</span>
            </div>
            <nav class="nav flex-column gap-1">
                <a class="nav-link" th:href="@{/admin/dashboard}"
                   th:classappend="${activePage == 'products'} ? 'active' : ''">📦 Bảng sản phẩm</a>
                <a class="nav-link" th:href="@{/admin/orders}"
                   th:classappend="${activePage == 'orders'} ? 'active' : ''">🧾 Đơn hàng</a>
                <a class="nav-link" th:href="@{/admin/revenue}"
                   th:classappend="${activePage == 'revenue'} ? 'active' : ''">📈 Thống kê doanh thu</a>
                <a class="nav-link" th:href="@{/admin/customers}"
                   th:classappend="${activePage == 'customers'} ? 'active' : ''">👥 Quản lý khách hàng</a>
            </nav>
            <hr class="border border-white border-opacity-25 my-4"/>
        </aside>

        <div class="offcanvas offcanvas-start text-white" tabindex="-1" id="mobileSidebar" style="background: #0b1f3a;">
            <div class="offcanvas-header" style="background: #09172c;">
                <h5 class="offcanvas-title text-white fw-bold text-uppercase"><i
                        class="fas fa-user-shield me-2 text-danger"></i> Menu Admin</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <nav class="nav flex-column gap-1">
                    <a class="nav-link" th:href="@{/admin/dashboard}"
                       th:classappend="${activePage == 'products'} ? 'active' : ''">📦 Bảng sản phẩm</a>
                    <a class="nav-link" th:href="@{/admin/orders}"
                       th:classappend="${activePage == 'orders'} ? 'active' : ''">🧾 Đơn hàng</a>
                    <a class="nav-link" th:href="@{/admin/revenue}"
                       th:classappend="${activePage == 'revenue'} ? 'active' : ''">📈 Thống kê doanh thu</a>
                    <a class="nav-link" th:href="@{/admin/customers}"
                       th:classappend="${activePage == 'customers'} ? 'active' : ''">👥 Quản lý khách hàng</a>
                </nav>
            </div>
        </div>

        <main class="col-lg-10 p-3 p-lg-4">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <button type="button" class="btn btn-outline-dark d-lg-none" data-bs-toggle="offcanvas"
                        data-bs-target="#mobileSidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="d-flex align-items-center gap-3 ms-auto">
                    <span class="text-dark small">Xin chào, <strong class="text-primary"
                                                                    th:text="${session.TenHienThi != null ? session.TenHienThi : 'Admin'}"></strong></span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger px-3"><i class="fas fa-sign-out-alt me-1"></i>Đăng
                        xuất</a>
                </div>
            </div>

            <div layout:fragment="content"></div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
