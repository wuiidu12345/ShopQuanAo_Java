<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_LayoutAccount}">
<head>
    <style>
        .form-control {
            height: 45px !important;
            padding-left: 15px !important;
            display: flex !important;
            align-items: center !important;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card w-100 shadow-sm" style="max-width: 400px;">
            <div class="card-body">
                <div class="text-center mb-4">
                    <img src="/assets/img/resourse/logo.png" alt="logo" class="img-fluid" style="width: 40px;">
                    <h5 class="mt-2 text-danger fw-bold">Đăng nhập</h5>
                </div>

                <div th:if="${successMessage != null}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <input type="text" class="form-control" name="email" placeholder="Email" required>
                    </div>

                    <div class="mb-3 position-relative">
                        <input type="password" class="form-control" name="password" id="loginPass" placeholder="Mật khẩu" required>
                        <span class="position-absolute top-50 end-0 translate-middle-y me-3" style="cursor:pointer;"
                              onclick="togglePass('loginPass', this)">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>

                    <button type="submit" class="btn btn-danger w-100">ĐĂNG NHẬP</button>
                </form>

                <div class="text-center text-muted my-3 small">Hoặc đăng nhập bằng</div>
                <div class="d-flex gap-2 mb-3">
                    <button class="btn btn-outline-secondary w-50"><i class="fab fa-google me-1 text-danger"></i>Google</button>
                    <button class="btn btn-outline-secondary w-50"><i class="fab fa-facebook-f me-1 text-primary"></i>Facebook</button>
                </div>

                <div class="text-center small">
                    <span>Chưa có tài khoản?</span>
                    <a th:href="@{/register}" class="text-danger text-decoration-none ms-1">Đăng ký</a>
                </div>
                <div class="text-center small mt-2">
                    <a href="javascript:void(0);" onclick="handleForgotPassword()" class="text-danger text-decoration-none">Quên mật khẩu?</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id, el) {
            var x = document.getElementById(id);
            var icon = el.querySelector('i');

            if (x.type === "password") {
                x.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                x.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Hàm hiển thị hộp thoại prompt tối giản chỉ cần Email và Mật khẩu mới
        function handleForgotPassword() {
            var email = prompt("Nhập địa chỉ Email tài khoản của bạn:");
            if (email == null || email.trim() === "") return;

            var newPass = prompt("Nhập Mật khẩu mới bạn muốn thay đổi:");
            if (newPass == null || newPass.trim() === "") return;

            // Tiến hành gửi dữ liệu ngầm lên hệ thống Java Controller xử lý
            $.ajax({
                url: '/Home/ForgotPassword',
                type: 'POST',
                data: {
                    email: email.trim(),
                    newPassword: newPass
                },
                success: function (res) {
                    // Hiển thị hộp thoại Alert thông báo kết quả từ server trả về
                    alert(res.message);
                },
                error: function () {
                    alert('Lỗi kết nối đến máy chủ hệ thống.');
                }
            });
        }
    </script>
</div>

</body>
</html>
