<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_Layout}">
<head>
    <title th:text="${title}"></title>
    <style>
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .short-input {
            max-width: 130px;
        }
    </style>
</head>
<body>

<div layout:fragment="content">

    <div class="x-breadcrumb__area base-bg mb-2">
        <div class="container">
            <div class="x-breadcrumb__list">
                <span><a th:href="@{/}">Trang chủ</a></span>
                <span class="dvdr"><i class="icon-arrow-right"></i></span>
                <span>Chi tiết sản phẩm</span>
            </div>
        </div>
    </div>

    <section class="product__details-area mb-35">
        <div class="container">
            <div class="row gutter-y-30">
                <div class="col-xl-6 col-lg-6">
                    <div class="product__details-thumb-tab">
                        <div class="tab-content mb-3" id="pills-tabContent">
                            <div th:each="img, iterStat : ${listImages}" class="tab-pane fade"
                                 th:id="'image-' + ${iterStat.index}" role="tabpanel"
                                 th:classappend="${iterStat.first} ? 'show active' : ''">
                                <div class="product__details-thumb-content w-img text-center">
                                    <img th:src="'/' + ${img}" th:alt="${product.tenSanPham}"
                                         style="width:100%; max-height:400px; object-fit:contain;">
                                </div>
                            </div>
                        </div>

                        <div class="product__details-thumb-nav x-tab">
                            <nav>
                                <div class="nav nav-tabs justify-content-center gap-2" role="tablist">
                                    <button th:each="img, iterStat : ${listImages}" class="nav-link border"
                                            th:classappend="${iterStat.first} ? 'active' : ''"
                                            data-bs-toggle="tab" th:data-bs-target="'#image-' + ${iterStat.index}"
                                            type="button" role="tab">
                                        <img th:src="'/' + ${img}" alt="thumb"
                                             style="width:90%; height:90%; object-fit:cover;">
                                    </button>
                                </div>
                            </nav>
                        </div>
                    </div>
                </div>

                <div class="col-xl-6 col-lg-6">
                    <div class="product__details-wrapper">
                        <h3 class="product__details-title mb-3" th:text="${product.tenSanPham}"></h3>

                        <div class="product__details-rating d-flex align-items-center mb-3">
                            <span th:if="${rating > 0}" class="text-warning fw-bold">
                                <span th:text="${#numbers.formatDecimal(rating, 1, 1)}"></span> <i
                                    class="fas fa-star"></i>
                                <span class="text-muted small ms-1"
                                      th:text="'(' + ${ratingCount} + ' đánh giá)'"></span>
                            </span>
                            <span th:unless="${rating > 0}" class="text-warning small">Chưa có đánh giá</span>
                        </div>

                        <p class="mb-4 text-muted" th:text="${product.moTa}"></p>

                        <div class="product__details-price mb-4">
                            <span class="product__details-ammount new-ammount fw-bold text-danger fs-3"
                                  th:text="${#numbers.formatInteger(product.giaBan, 3, 'POINT')} + 'đ'"></span>
                        </div>

                        <div class="product__details-action">
                            <form th:action="@{/AddToCartFromDetails}" method="post">
                                <input type="hidden" name="MaSP" th:value="${product.maSP}"/>

                                <div class="row g-3">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label fw-bold">Kích Thước:</label>
                                        <select class="form-select short-input" name="SizeId" id="SizeId">
                                            <option th:each="size : ${listSizes}" th:value="${size.get('MaKichThuoc')}"
                                                    th:text="${size.get('TenKichThuoc')}"></option>
                                        </select>
                                    </div>

                                    <div class="col-12 col-md-6">
                                        <label class="form-label fw-bold">Số lượng:</label>
                                        <div class="input-group short-input">
                                            <button class="btn btn-outline-secondary" type="button" id="btnMinus">-
                                            </button>
                                            <input type="number" class="form-control text-center" value="1" min="1"
                                                   id="txtQuantity" name="Quantity">
                                            <button class="btn btn-outline-secondary" type="button" id="btnPlus">+
                                            </button>
                                        </div>
                                    </div>

                                    <div class="col-12 mt-4 d-flex gap-2">
                                        <button type="submit" name="submitType" value="buy"
                                                class="btn btn-danger flex-grow-1 py-3">MUA NGAY
                                        </button>
                                        <button type="button" id="btnAddToCartAJAX"
                                                class="btn btn-primary flex-grow-1 py-3">THÊM VÀO GIỎ
                                        </button>
                                    </div>
                                </div>
                            </form>
                            <div th:if="${successMessage != null}" class="alert alert-success mt-3" role="alert">
                                <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="review-area" class="product__review-area mb-20 bg-light mt-1 py-4">
        <div class="container">
            <h4 class="mb-4">Đánh giá sản phẩm</h4>

            <div class="card mb-4 shadow-sm border-0">
                <div class="card-body">
                    <h6 class="card-title mb-3">Viết đánh giá của bạn</h6>
                    <form th:action="@{/Home/AddReview}" method="post">
                        <input type="hidden" name="MaSP" th:value="${product.maSP}"/>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tên của bạn:</label>
                                <input type="text" class="form-control" name="TenKhachHang" placeholder="Nhập tên..."
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Đánh giá:</label>
                                <input type="hidden" id="reviewRating" name="SoSao" value="5">
                                <div id="star-container" class="d-flex align-items-center gap-1 mt-1"
                                     style="font-size: 1.2rem; cursor: pointer;">
                                    <i class="fas fa-star text-warning star-item" data-value="1"></i>
                                    <i class="fas fa-star text-warning star-item" data-value="2"></i>
                                    <i class="fas fa-star text-warning star-item" data-value="3"></i>
                                    <i class="fas fa-star text-warning star-item" data-value="4"></i>
                                    <i class="fas fa-star text-warning star-item" data-value="5"></i>
                                    <span id="rating-text" class="ms-2 small text-muted">(Tuyệt vời)</span>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Nội dung đánh giá:</label>
                                <textarea class="form-control" name="NoiDung" rows="3"
                                          placeholder="Chia sẻ cảm nhận về sản phẩm..." required></textarea>
                            </div>

                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary px-4"><i
                                        class="fas fa-paper-plane me-1"></i> Gửi đánh giá
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="list-group">
                <div th:each="c : ${listComments}" class="list-group-item mb-3 border-0 shadow-sm rounded">
                    <div class="d-flex align-items-center mb-1 justify-content-between">
                        <strong class="me-2" th:text="${c.get('TenKhachHang')}"></strong>
                        <span class="text-warning">
                            <i th:each="k : ${#numbers.sequence(1, 5)}"
                               th:class="${k <= (c.get('SoSao'))} ? 'fas fa-star' : 'far fa-star'"></i>
                        </span>
                    </div>
                    <div class="text-muted small">Đã mua hàng</div>
                    <div th:text="${c.get('NoiDung')}"></div>
                </div>
                <div th:if="${listComments.isEmpty()}" class="text-center text-muted py-4">Chưa có đánh giá nào cho sản
                    phẩm này.
                </div>
            </div>
        </div>
    </section>

    <section class="container mb-10 py-4">
        <h4 class="mb-4">Sản phẩm liên quan</h4>
        <div class="row gutter-y-30">
            <div th:each="item : ${relatedProducts}" class="col-xl-3 col-md-6 col-sm-6 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="position-relative">
                        <a th:href="@{/product_details(id=${item.maSP})}">
                            <img th:src="'/' + ${item.anhDaiDien}" class="card-img-top" th:alt="${item.tenSanPham}"
                                 style="width:100%; height:200px; object-fit:contain; border-bottom:1px solid #eee;">
                        </a>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="mb-1 d-flex align-items-center">
                            <span class="text-warning small">
                                <span th:text="${#numbers.formatDecimal(item.diemDanhGia, 1, 1)}"></span> <i
                                    class="fas fa-star"></i>
                            </span>
                            <span class="text-muted small ms-1" th:text="'(' + ${item.soLuongDanhGia} + ')'"></span>
                        </div>
                        <h5 class="card-title mb-2">
                            <a th:href="@{/product_details(id=${item.maSP})}" class="text-decoration-none text-dark"
                               th:text="${item.tenSanPham}"></a>
                        </h5>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-danger"
                                  th:text="${#numbers.formatInteger(item.giaBan, 3, 'POINT')} + 'đ'"></span>
                            <a th:href="@{/product_details(id=${item.maSP})}" class="btn btn-outline-primary btn-sm"
                               title="Xem chi tiết"><i class="fas fa-shopping-cart"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>
<th:block layout:fragment="scripts">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // XỬ LÝ SỐ LƯỢNG TĂNG GIẢM
            const btnMinus = document.getElementById('btnMinus');
            const btnPlus = document.getElementById('btnPlus');
            const txtQty = document.getElementById('txtQuantity');
            if (btnMinus && btnPlus && txtQty) {
                btnMinus.addEventListener('click', () => {
                    let val = parseInt(txtQty.value) || 1;
                    if (val > 1) txtQty.value = val - 1;
                });
                btnPlus.addEventListener('click', () => {
                    let val = parseInt(txtQty.value) || 1;
                    txtQty.value = val + 1;
                });
            }

            // XỬ LÝ ĐÁNH GIÁ SAO ĐỘNG
            const stars = document.querySelectorAll('.star-item');
            const ratingInput = document.getElementById('reviewRating');
            const ratingText = document.getElementById('rating-text');
            const textLabels = ["Rất tệ", "Tệ", "Bình thường", "Tốt", "Tuyệt vời"];

            function highlightStars(count) {
                stars.forEach(star => {
                    const value = parseInt(star.getAttribute('data-value'));
                    if (value <= count) {
                        star.className = 'fas fa-star text-warning star-item';
                    } else {
                        star.className = 'far fa-star text-secondary star-item';
                    }
                });
                if (ratingText) ratingText.textContent = `(${textLabels[count - 1]})`;
            }

            if (stars.length > 0) {
                stars.forEach(star => {
                    star.addEventListener('mouseover', function () {
                        const value = parseInt(this.getAttribute('data-value'));
                        highlightStars(value);
                    });
                    star.addEventListener('click', function () {
                        const value = parseInt(this.getAttribute('data-value'));
                        ratingInput.value = value;
                    });
                });
                document.getElementById('star-container').addEventListener('mouseleave', function () {
                    const currentValue = parseInt(ratingInput.value);
                    highlightStars(currentValue);
                });
            }

            // XỬ LÝ AJAX THÊM VÀO GIỎ HÀNG TỪ TRANG CHI TIẾT
            $('#btnAddToCartAJAX').click(function () {
                var maSP = $('input[name="MaSP"]').val();
                var sizeId = $('#SizeId').val();
                var quantity = $('#txtQuantity').val();

                $.ajax({
                    url: '/Home/AddToCartDetailsAJAX', // Gọi tới hàm chi tiết vừa tạo
                    type: 'POST',
                    data: {MaSP: maSP, SizeId: sizeId, Quantity: quantity},
                    success: function (response) {
                        if (response.success) {
                            // 1. Cập nhật con số đếm nhỏ trên giỏ hàng ở thanh Header giống dự án cũ
                            $('.x-cart-count').text(response.count);

                            // 2. Trượt thanh thông báo Toast màu xanh lên báo thành công đẹp mắt
                            var toastEl = document.getElementById('cartToast');
                            if (toastEl) {
                                var toast = new bootstrap.Toast(toastEl);
                                $('.toast-body').text(response.message);
                                toast.show();
                            } else {
                                alert(response.message);
                            }
                        } else {
                            alert(response.message);
                        }
                    },
                    error: function () {
                        alert('Lỗi kết nối đến máy chủ.');
                    }
                });
            });
        });
    </script>
</th:block>

</body>
</html>
