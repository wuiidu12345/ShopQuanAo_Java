spring.application.name=ShopQuanAo_Java

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShopQuanAo;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cấu hình Hibernate (Không tự động sửa đổi cấu trúc bảng SQL)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Nếu IntelliJ báo lỗi cổng 8081 này bị chiếm rồi thì hãy đổi sang 8082, 8083, ... và Run lại nhé
server.port=8081
