<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_Layout}">
<head>
    <title th:text="${title}"></title>
</head>
<body>

<div layout:fragment="content">
    <div id="mainCarousel" class="carousel slide mb-4" data-bs-ride="carousel" data-bs-interval="2000">
        <div class="carousel-indicators">
            <button th:each="banner, iterStat : ${bannerImages}" type="button" data-bs-target="#mainCarousel"
                    th:attr="data-bs-slide-to=${iterStat.index}"
                    th:classappend="${iterStat.first} ? 'active' : ''"></button>
        </div>
        <div class="carousel-inner">
            <div th:each="banner, iterStat : ${bannerImages}" class="carousel-item"
                 th:classappend="${iterStat.first} ? 'active' : ''">
                <img th:src="${banner}" class="d-block w-100"
                     style="height: 400px; object-fit: cover; object-position: center top;"
                     th:alt="'Banner ' + ${iterStat.count}">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev"
                style="width: 5%;">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next"
                style="width: 5%;">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="x-product-eight mb-10">
        <div class="container">
            <div class="x-sec-heading x-sec-heading-three text-center">
                <h3 class="x-sec-heading__title x-style-3">Trang phục thịnh hành</h3>
                <div class="x-sec-heading__shape">
                    <img src="/assets/img/resourse/sec-title-border.png" alt="border">
                </div>
            </div>

            <div class="row gutter-y-30">
                <div th:each="item : ${trending}" class="col-xl-3 col-md-6 col-sm-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="position-relative">
                            <a th:href="@{/product_details(id=${item.maSP})}">
                                <img th:src="${item.anhDaiDien}" class="card-img-top" th:alt="${item.tenSanPham}"
                                     style="width:100%; height:200px; object-fit:contain; border-bottom:1px solid #eee;">
                            </a>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div class="mb-2 d-flex align-items-center">
                                <span class="text-warning small">
                                    <span th:text="${#numbers.formatDecimal(item.diemDanhGia, 1, 1)}"></span> <i
                                        class="fas fa-star"></i>
                                </span>
                                <span class="text-muted small ms-1" th:text="'(' + ${item.soLuongDanhGia} + ')'"></span>
                            </div>
                            <h5 class="card-title mb-2">
                                <a th:href="@{/product_details(id=${item.maSP})}" class="text-decoration-none text-dark"
                                   th:text="${item.tenSanPham}"></a>
                            </h5>
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-danger"
                                      th:text="${#numbers.formatInteger(item.giaBan, 3, 'POINT')} + 'đ'"></span>
                                <a href="javascript:void(0);" class="btn btn-outline-primary btn-sm ajax-add-to-cart"
                                   th:attr="data-id=${item.maSP}">
                                    <i class="fas fa-shopping-cart"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section id="shop-area" class="x-shop-area pt-0 mb-50">
        <div class="container">
            <div class="row">
                <div class="col-xl-12 col-lg-8">
                    <div class="card mb-4">
                        <div class="card-body">
                            <form th:action="@{/}" method="get" class="row g-3 align-items-end">
                                <div class="col-md-3">
                                    <input type="text" class="form-control" name="searchName" th:value="${searchName}"
                                           placeholder="Nhập tên sản phẩm...">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1">Danh mục</label>
                                    <select class="form-select" name="category">
                                        <option value="">Tất cả</option>
                                        <option value="Áo" th:selected="${category == 'Áo'}">Áo</option>
                                        <option value="Quần" th:selected="${category == 'Quần'}">Quần</option>
                                        <option value="Giày" th:selected="${category == 'Giày'}">Giày</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1">Khoảng giá</label>
                                    <select class="form-select" name="priceRange">
                                        <option value="">Tất cả</option>
                                        <option value="0-300000" th:selected="${priceRange == '0-300000'}">Dưới
                                            300.000đ
                                        </option>
                                        <option value="300000-600000" th:selected="${priceRange == '300000-600000'}">
                                            300.000đ - 600.000đ
                                        </option>
                                        <option value="600000-1000000" th:selected="${priceRange == '600000-1000000'}">
                                            600.000đ - 1.000.000đ
                                        </option>
                                        <option value="1000000-999999999"
                                                th:selected="${priceRange == '1000000-999999999'}">Trên 1.000.000đ
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1">Sắp xếp</label>
                                    <select name="sortType" class="form-select">
                                        <option value="default" th:selected="${sortType == 'default'}">Mặc định</option>
                                        <option value="desc" th:selected="${sortType == 'desc'}">Giảm dần theo giá
                                        </option>
                                        <option value="asc" th:selected="${sortType == 'asc'}">Tăng dần theo giá
                                        </option>
                                        <option value="rating" th:selected="${sortType == 'rating'}">Đánh giá cao
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-grid">
                                    <button type="submit" class="btn btn-primary mt-3"><i
                                            class="fas fa-search me-1"></i>Tìm kiếm
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="x-shop-main-wrapper">
                        <div class="row gutter-y-20">
                            <div th:each="item : ${products}" class="col-xl-3 col-md-6 col-sm-6 mb-4">
                                <div class="card h-100 shadow-sm">
                                    <div class="position-relative">
                                        <a th:href="@{/product_details(id=${item.maSP})}">
                                            <img th:src="${item.anhDaiDien}" class="card-img-top"
                                                 th:alt="${item.tenSanPham}"
                                                 style="width:100%; height:200px; object-fit:contain; border-bottom:1px solid #eee;">
                                        </a>
                                    </div>
                                    <div class="card-body d-flex flex-column">
                                        <div class="mb-2 d-flex align-items-center">
                                            <span class="text-warning small">
                                                <span th:text="${#numbers.formatDecimal(item.diemDanhGia, 1, 1)}"></span> <i
                                                    class="fas fa-star"></i>
                                            </span>
                                            <span class="text-muted small ms-1"
                                                  th:text="'(' + ${item.soLuongDanhGia} + ')'"></span>
                                        </div>
                                        <h5 class="card-title mb-2">
                                            <a th:href="@{/product_details(id=${item.maSP})}"
                                               class="text-decoration-none text-dark" th:text="${item.tenSanPham}"></a>
                                        </h5>
                                        <div class="mt-auto d-flex justify-content-between align-items-center">
                                            <span class="fw-bold text-danger"
                                                  th:text="${#numbers.formatInteger(item.giaBan, 3, 'POINT')} + 'đ'"></span>
                                            <a href="javascript:void(0);"
                                               class="btn btn-outline-primary btn-sm ajax-add-to-cart"
                                               th:attr="data-id=${item.maSP}">
                                                <i class="fas fa-shopping-cart"></i>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="x-shop-pagination mt-20" th:if="${totalPages > 1}">
                        <div class="x-pagination text-center">
                            <ul>
                                <li th:if="${currentPage > 1}">
                                    <a th:href="@{/(page=${currentPage - 1}, searchName=${searchName}, category=${category}, priceRange=${priceRange}, sortType=${sortType})} + '#shop-area'">
                                        <i class="fas fa-angle-left"></i>
                                    </a>
                                </li>

                                <li th:each="i : ${#numbers.sequence(1, totalPages)}">
                                    <a th:class="${i == currentPage} ? 'current' : ''"
                                       th:href="@{/(page=${i}, searchName=${searchName}, category=${category}, priceRange=${priceRange}, sortType=${sortType})} + '#shop-area'"
                                       th:text="${i}"></a>
                                </li>

                                <li th:if="${currentPage < totalPages}">
                                    <a th:href="@{/(page=${currentPage + 1}, searchName=${searchName}, category=${category}, priceRange=${priceRange}, sortType=${sortType})} + '#shop-area'">
                                        <i class="fas fa-angle-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>
</div>

<th:block layout:fragment="scripts">
    <script>
        $(document).ready(function () {

            // -------------------------------------------------------------------------------------------------------------
            // Tiếp nhận hành động bấm nút thêm nhanh sản phẩm vào giỏ hàng qua request AJAX
            $('.ajax-add-to-cart').click(function (e) {
                e.preventDefault();
                var btn = $(this);
                var productId = btn.data('id');

                $.ajax({
                    url: '/Home/AddToCartAJAX',
                    type: 'POST',
                    data: {id: productId},
                    success: function (response) {
                        if (response.success) {
                            $('.x-cart-count').text(response.count);
                            var toastEl = document.getElementById('cartToast');
                            var toast = new bootstrap.Toast(toastEl);
                            $('.toast-body').text(response.message);
                            toast.show();
                        } else {
                            alert(response.message);
                        }
                    },
                    error: function () {
                        alert('Có lỗi xảy ra, vui lòng thử lại.');
                    }
                });
            });

            // -------------------------------------------------------------------------------------------------------------
            // Tự động cuộn mượt mà màn hình đến khu vực sản phẩm khi kích hoạt các bộ lọc tìm kiếm phân trang
            if (window.location.search.length > 1) {
                if ('history' in window && 'scrollRestoration' in window.history) {
                    window.history.scrollRestoration = 'manual';
                }
                const shopArea = document.getElementById('shop-area');
                if (shopArea) {
                    shopArea.scrollIntoView({behavior: 'smooth', block: 'start'});
                }
            }
        });
    </script>
</th:block>

</body>
</html>
