<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_Layout}">
<head>
    <title th:text="${title}"></title>
</head>
<body>

<div layout:fragment="content">
    <div class="x-breadcrumb__area base-bg">
        <div class="x-breadcrumb__bg w-img x-breadcrumb__overlay"></div>
        <div class="container">
            <div class="row">
                <div class="col-xxl-12">
                    <div class="x-breadcrumb__content p-relative z-index-1">
                        <div class="x-breadcrumb__list">
                            <span><a th:href="@{/}">Trang chủ</a></span>
                            <span class="dvdr"><i class="icon-arrow-right"></i></span>
                            <span>Quản lý đơn hàng</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="x-cart-page pt-2 pb-70">
        <div class="container">
            <div th:if="${orders != null and !orders.isEmpty()}" class="row gutter-y-30 gx-5">

                <div class="col-lg-3 col-xl-3">
                    <div class="list-group" id="order-list-tab" role="tablist">
                        <a th:each="item, stat : ${orders}"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-start order-tab-btn"
                           th:classappend="${stat.first} ? 'active' : ''"
                           th:id="'list-' + ${item.maDonHang} + '-list'"
                           data-bs-toggle="list"
                           th:href="'#list-' + ${item.maDonHang}"
                           role="tab">
                            <div class="ms-2 me-auto">
                                <div class="fw-bold" th:text="${item.maDonHang}"></div>
                                <small class="text-muted"
                                       th:text="${#temporals.format(item.ngayDat, 'dd/MM/yyyy HH:mm')}"></small>
                            </div>
                            <span class="badge rounded-pill"
                                  th:classappend="${item.trangThai == 'Hoàn tất' ? 'bg-success' : (item.trangThai == 'Hủy' ? 'bg-danger' : (item.trangThai == 'Đang giao' ? 'bg-primary' : 'bg-warning text-dark'))}"
                                  th:text="${item.trangThai}"></span>
                        </a>
                    </div>
                </div>

                <div class="col-lg-9 col-xl-9">
                    <div class="tab-content" id="nav-tabContent">
                        <div th:each="item, stat : ${orders}"
                             class="tab-pane fade"
                             th:classappend="${stat.first} ? 'show active' : ''"
                             th:id="'list-' + ${item.maDonHang}" role="tabpanel">

                            <div class="card shadow-sm border-0">
                                <div class="card-header bg-white py-3">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h5 class="mb-0 text-primary" th:text="'Đơn hàng: #' + ${item.maDonHang}"></h5>
                                        <span class="badge rounded-pill" style="font-size: 1rem; padding: 10px 20px;"
                                              th:classappend="${item.trangThai == 'Hoàn tất' ? 'bg-success' : (item.trangThai == 'Hủy' ? 'bg-danger' : (item.trangThai == 'Đang giao' ? 'bg-primary' : 'bg-warning text-dark'))}"
                                              th:text="${item.trangThai}">
                                        </span>
                                    </div>
                                </div>

                                <div class="card-body p-0">
                                    <div class="p-3 border-bottom" style="background-color: #f8f9fa;">
                                        <div class="row text-muted" style="font-size: 0.9rem;">
                                            <div class="col-md-6 mb-2 mb-md-0">
                                                <p class="mb-1">
                                                    <i class="fas fa-user me-2 text-secondary"></i>Người nhận:
                                                    <strong class="text-dark" th:text="${item.tenNguoiNhan}"></strong>
                                                </p>
                                                <p class="mb-0">
                                                    <i class="fas fa-phone me-2 text-secondary"></i>SĐT:
                                                    <strong class="text-dark" th:text="${item.soDienThoai}"></strong>
                                                </p>
                                            </div>
                                            <div class="col-md-6">
                                                <p class="mb-1">
                                                    <i class="fas fa-map-marker-alt me-2 text-secondary"></i>Địa chỉ:
                                                    <strong class="text-dark" th:text="${item.diaChiGiao}"></strong>
                                                </p>
                                                <p th:if="${item.ghiChu != null and !item.ghiChu.isEmpty()}"
                                                   class="mb-0 text-danger">
                                                    <i class="fas fa-sticky-note me-2 text-secondary"></i>Ghi chú:
                                                    <span class="fst-italic"
                                                          th:text="'&quot;' + ${item.ghiChu} + '&quot;'"></span>
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="bg-light">
                                            <tr>
                                                <th class="ps-4">Sản phẩm</th>
                                                <th class="text-center">Kích thước</th>
                                                <th class="text-center">Giá</th>
                                                <th class="text-center">Số lượng</th>
                                                <th class="text-end pe-4">Thành tiền</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="detail : ${item.chiTiet}">
                                                <td class="ps-4">
                                                    <div class="d-flex align-items-center">
                                                        <a th:href="@{/product_details(id=${detail.maSP})}">
                                                            <img th:src="'/' + ${detail.anhDaiDien}" alt=""
                                                                 style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"
                                                                 class="me-3 border">
                                                        </a>
                                                        <div>
                                                            <a th:href="@{/product_details(id=${detail.maSP})}"
                                                               class="text-decoration-none">
                                                                <h6 class="mb-0 text-dark" style="font-size: 14px;"
                                                                    th:text="${detail.tenSanPham}"></h6>
                                                            </a>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="text-center"><span class="badge bg-light text-dark border"
                                                                              th:text="${detail.tenKichThuoc}"></span>
                                                </td>
                                                <td class="text-center"
                                                    th:text="${#numbers.formatInteger(detail.donGia, 3, 'POINT')} + 'đ'"></td>
                                                <td class="text-center" th:text="'x ' + ${detail.soLuong}"></td>
                                                <td class="text-end pe-4"
                                                    th:text="${#numbers.formatInteger(detail.thanhTien, 3, 'POINT')} + 'đ'"></td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="card-footer bg-white">
                                    <div class="row justify-content-end">
                                        <div class="col-md-5">
                                            <table class="table table-borderless table-sm">
                                                <tr>
                                                    <td class="text-muted">Tạm tính:</td>
                                                    <td class="text-end fw-bold"
                                                        th:text="${#numbers.formatInteger(item.tamTinh, 3, 'POINT')} + 'đ'"></td>
                                                </tr>
                                                <tr>
                                                    <td class="text-muted">Phí vận chuyển:</td>
                                                    <td class="text-end fw-bold"
                                                        th:text="${#numbers.formatInteger(item.phiVanChuyen, 3, 'POINT')} + 'đ'"></td>
                                                </tr>
                                                <tr>
                                                    <td class="text-success">Giảm giá:</td>
                                                    <td class="text-end text-success fw-bold"
                                                        th:text="'-' + ${#numbers.formatInteger(item.giamGia, 3, 'POINT')} + 'đ'"></td>
                                                </tr>
                                                <tr class="border-top">
                                                    <td class="pt-2"><span class="mb-0 fw-bold" style="font-size: 18px">Thành tiền:</span>
                                                    </td>
                                                    <td class="text-end pt-2"><span class="text-danger mb-0 fw-bold"
                                                                                    style="font-size: 18px"
                                                                                    th:text="${#numbers.formatInteger(item.tongTien, 3, 'POINT')} + 'đ'"></span>
                                                    </td>
                                                </tr>
                                            </table>

                                            <button th:if="${item.trangThai == 'Chờ xác nhận'}"
                                                    class="btn btn-outline-danger w-100 mt-2 btn-cancel-order"
                                                    th:attr="data-id=${item.maDonHang}">
                                                <i class="fas fa-trash-alt me-2"></i>Hủy đơn hàng
                                            </button>

                                            <button th:if="${item.trangThai == 'Đang giao'}"
                                                    class="btn btn-success w-100 mt-2 btn-confirm-received"
                                                    th:attr="data-id=${item.maDonHang}">
                                                <i class="fas fa-check-circle me-2"></i>Đã nhận được hàng
                                            </button>

                                            <button th:if="${item.trangThai == 'Hoàn tất'}"
                                                    class="btn btn-secondary w-100 mt-2" disabled>
                                                Đơn hàng đã hoàn thành
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
                <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png" width="100" class="mb-3"
                     style="opacity: 0.5">
                <h4>Bạn chưa có đơn hàng nào!</h4>
                <p class="text-muted">Hãy dạo một vòng cửa hàng và chọn món đồ ưng ý nhé.</p>
                <a th:href="@{/}" class="btn btn-primary mt-3">Mua sắm ngay</a>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        $(document).ready(function () {
            // Xử lý nút "Đã nhận được hàng"
            $('.btn-confirm-received').click(function () {
                var btn = $(this);
                var maDH = btn.data('id');

                if (confirm('Bạn xác nhận đã nhận được đơn hàng ' + maDH + ' và muốn hoàn tất đơn hàng này?')) {
                    $.ajax({
                        url: '/Home/ConfirmReceived',
                        type: 'POST',
                        data: {maDonHang: maDH},
                        success: function (res) {
                            if (res.success) {
                                alert(res.message);
                                location.reload();
                            } else {
                                alert(res.message);
                            }
                        },
                        error: function () {
                            alert('Lỗi kết nối server.');
                        }
                    });
                }
            });

            $('.btn-cancel-order').click(function () {
                var maDH = $(this).data('id');
                if (confirm('Bạn chắc chắn muốn hủy đơn hàng ' + maDH + '?')) {
                    $.ajax({
                        url: '/Home/CancelOrder',
                        type: 'POST',
                        data: {maDonHang: maDH},
                        success: function (res) {
                            if (res.success) {
                                alert(res.message);
                                location.reload();
                            } else {
                                alert(res.message);
                            }
                        }
                    });
                }
            });
        });
    </script>
</th:block>

</body>
</html>
